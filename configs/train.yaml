defaults:
  - model: TCN
  - _self_
loss: absolute  # absolute | relative | classification
classification:
  bpm_min: 30
  bpm_max: 286
  n_bins: 256
  sigma: 1.5
lr: 4e-3
weight_decay: 0.0
batch_size: 32
n_mels: 128
hop_length: 512
train_subsample: null
checkpoint_dir: checkpoints/
trainer:
  max_epochs: 100
  accelerator: mps
  devices: 1
  log_every_n_steps: 10
  check_val_every_n_epoch: 1
data:
  name: ballroom
  data_home: ${hydra:runtime.cwd}/data/ballroom
  sample_rate: 22050
  duration: 15.0
  val_split: 0.2
  num_workers: 4
augmentations:
  enabled: true
  time_stretch:
    enabled: true
    min_rate: 0.75
    max_rate: 1.25
  gain:
    enabled: true
    min_db: -6.0
    max_db: 6.0
  noise:
    enabled: false
    std: 0.005
wandb:
  project: musicality
  run_name: null
  tags: []
