<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Musicality Field Capture</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#111111" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 16px;
      max-width: 480px;
    }
    h1 {
      font-size: 1.3rem;
    }
    section {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      font-size: 1rem;
      padding: 8px;
      background: #222;
      border: 1px solid #444;
      color: #eee;
      border-radius: 6px;
    }
    button {
      font-size: 1.1rem;
      padding: 14px 20px;
      border-radius: 8px;
      border: none;
      margin-right: 8px;
      margin-bottom: 8px;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    #record-btn {
      background: #b33;
      color: #fff;
    }
    #tap-btn {
      background: #369;
      color: #fff;
      display: block;
      width: 100%;
      box-sizing: border-box;
      font-size: 3.3rem;
      padding: 42px 20px;
    }
    #save-btn {
      background: #3a3;
      color: #fff;
    }
    #sync-btn {
      background: #963;
      color: #fff;
    }
    button:disabled {
      background: #333;
      color: #777;
    }
    .toggle-group {
      display: flex;
      gap: 8px;
    }
    .toggle-btn {
      flex: 1;
      background: #222;
      color: #aaa;
      border: 1px solid #444;
    }
    .toggle-btn.active {
      background: #2a4a2a;
      color: #fff;
      border: 1px solid #4a8a4a;
    }
    #tap-stats p {
      margin: 2px 0;
      font-size: 0.95rem;
    }
    #status,
    #pending-count {
      font-size: 0.9rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>Musicality Field Capture</h1>

  <section>
    <label for="dataset-input">Dataset</label>
    <input id="dataset-input" list="dataset-options" value="swing" placeholder="e.g. field_recordings" />
    <datalist id="dataset-options"></datalist>
  </section>

  <section>
    <label for="track-name-input">Track name (optional)</label>
    <input id="track-name-input" placeholder="leave blank to auto-generate" />
  </section>

  <section>
    <button id="record-btn" type="button">● Record</button>
  </section>

  <section>
    <button id="tap-btn" type="button" disabled>Tap (beat)</button>
  </section>

  <section id="tap-stats">
    <p id="tap-count">N: 0</p>
    <p id="tap-last">Last: —</p>
    <p id="tap-recent">Recent (8): —</p>
    <p id="tap-all">All — Mean: —   Median: —   Std: —</p>
  </section>

  <section>
    <button id="save-btn" type="button" disabled>Save</button>
    <p id="status"></p>
    <p id="pending-count"></p>
  </section>

  <section>
    <button id="sync-btn" type="button">Sync</button>
    <p id="sync-status"></p>
  </section>

  <script type="module" src="/static/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
  </script>
</body>
</html>
